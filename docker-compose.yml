version: '3.8'

services:
  backend:
    build: ./backend
    container_name: groww-bot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - groww_data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: groww-bot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  groww_data:
